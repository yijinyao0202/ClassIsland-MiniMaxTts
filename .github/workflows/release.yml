name: Release

on:
  push:
    tags:
      - "*.*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build plugin
        run: dotnet build ClassIsland.MiniMaxTts.csproj --configuration Release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: cipx/ClassIsland.MiniMaxTts.cipx
